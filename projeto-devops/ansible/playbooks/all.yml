---
- name: Configurações comuns para todas as VMs
  hosts: all
  become: yes
  
  tasks:
    - name: Atualizar cache apt e sistema (update e upgrade)
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Instalar chrony (NTP)
      apt:
        name: chrony
        state: present

    - name: Configurar servidor NTP para pool.ntp.br
      lineinfile:
        path: /etc/chrony/chrony.conf
        regexp: '^pool'
        line: 'pool pool.ntp.br iburst'
      notify: restart chrony

    - name: Iniciar e habilitar chrony
      service:
        name: chrony
        state: started
        enabled: yes

    - name: Ajustar timezone para America/Recife
      timezone:
        name: America/Recife

    - name: Criar grupo ifpb
      group:
        name: ifpb
        state: present

    - name: Criar usuário pedro
      user:
        name: pedro
        groups: ifpb
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Criar usuário barbosa
      user:
        name: barbosa
        groups: ifpb
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Permitir sudo para grupo ifpb (acesso root)
      lineinfile:
        path: /etc/sudoers
        state: present
        regexp: '^%ifpb'
        line: '%ifpb ALL=(ALL:ALL) ALL'
        validate: 'visudo -cf %s'

    - name: Criar diretório .ssh para pedro
      file:
        path: /home/pedro/.ssh
        state: directory
        owner: pedro
        group: pedro
        mode: '0700'

    - name: Criar diretório .ssh para barbosa
      file:
        path: /home/barbosa/.ssh
        state: directory
        owner: barbosa
        group: barbosa
        mode: '0700'

    - name: Gerar chave SSH para pedro
      openssh_keypair:
        path: /home/pedro/.ssh/id_rsa
        owner: pedro
        group: pedro
        type: rsa
        size: 2048

    - name: Gerar chave SSH para barbosa
      openssh_keypair:
        path: /home/barbosa/.ssh/id_rsa
        owner: barbosa
        group: barbosa
        type: rsa
        size: 2048

    - name: Configurar authorized_keys para pedro
      shell: |
        cat /home/pedro/.ssh/id_rsa.pub >> /home/pedro/.ssh/authorized_keys
        chmod 600 /home/pedro/.ssh/authorized_keys
        chown pedro:pedro /home/pedro/.ssh/authorized_keys

    - name: Configurar authorized_keys para barbosa
      shell: |
        cat /home/barbosa/.ssh/id_rsa.pub >> /home/barbosa/.ssh/authorized_keys
        chmod 600 /home/barbosa/.ssh/authorized_keys
        chown barbosa:barbosa /home/barbosa/.ssh/authorized_keys

    - name: Criar banner SSH
      copy:
        dest: /etc/ssh/banner
        content: "Acesso apenas para pessoas com autorização expressa!!!\n"
        owner: root
        group: root
        mode: '0644'

    - name: Configurar SSH - Permitir apenas autenticação por chaves públicas
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: restart sshd

    - name: Configurar SSH - Habilitar PubkeyAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
      notify: restart sshd

    - name: Configurar SSH - Bloquear acesso root
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: restart sshd

    - name: Configurar SSH - Permitir apenas grupos vagrant e ifpb
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?AllowGroups'
        line: 'AllowGroups vagrant ifpb'
      notify: restart sshd

    - name: Configurar SSH - Banner de saudação
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Banner'
        line: 'Banner /etc/ssh/banner'
      notify: restart sshd

    - name: Instalar cliente NFS
      apt:
        name: nfs-common
        state: present

  handlers:
    - name: restart chrony
      service:
        name: chrony
        state: restarted

    - name: restart sshd
      service:
        name: sshd
        state: restarted
